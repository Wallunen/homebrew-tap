name: Build and publish bottles

on:
  workflow_dispatch:

jobs:
  bottle:
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15-intel
          - macos-26
        include:
          - os: ubuntu-latest
            container: ghcr.io/homebrew/brew:main
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install development tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build bottles
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          ROOT_URL="https://github.com/${{ github.repository }}/releases/download/bottles-${GITHUB_SHA::8}"
          TAP="${{ github.repository_owner }}/tap"
          formulae=$(find "${{ steps.set-up-homebrew.outputs.repository-path }}/Formula" -name '*.rb' -exec basename -s .rb {} + | tr '\n' ',' | sed 's/,$//')
          IFS=',' read -ra formulae <<< "$formulae"

          for f in "${formulae[@]}"; do
            brew uninstall --ignore-dependencies "${TAP}/${f}" 2>/dev/null || true
            brew install --only-dependencies --build-from-source "${TAP}/${f}" || true
            brew install --build-bottle --ignore-dependencies "${TAP}/${f}"
            chmod -R u+rwX "$(brew --cellar)/${f}"
            brew bottle --json --root-url="$ROOT_URL" "${TAP}/${f}"
          done
        timeout-minutes: 60

      - name: Upload bottles
        uses: actions/upload-artifact@v7
        with:
          name: bottles_${{ matrix.os }}
          if-no-files-found: ignore
          path: "*.bottle.*"

  publish:
    needs: bottle
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download bottles
        uses: actions/download-artifact@v8
        with:
          pattern: bottles_*
          merge-multiple: true

      - name: Rename bottles for upload
        run: |
          for file in *.bottle*.tar.gz; do
            mv "$file" "$(echo "$file" | sed -e 's/--/-/' -e 's/\.bottle\.[0-9]*\.tar\.gz/.bottle.tar.gz/')"
          done

      - name: Upload bottles to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "bottles-${GITHUB_SHA::8}" \
            --repo "${{ github.repository }}" \
            --title "Bottles for ${GITHUB_SHA::8}" \
            --notes "Automated bottle build" \
            *.bottle*.tar.gz

      - name: Update formulae with bottle blocks
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
        run: brew bottle --merge --write --no-commit *.bottle.json

      - name: Commit and push
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        run: |
          if ! git diff --quiet -- Formula/; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Formula/
            git commit -m "Update bottle blocks"
            git push origin main
          fi
